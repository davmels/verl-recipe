# the sppo config will override default ppo_trainer.yaml

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

actor_rollout_ref:
  actor:
    dpo_beta: 0.1
    optim:
      lr_warmup_steps: 15
  rollout:
    name: sglang
    tensor_model_parallel_size: 2
    gpu_memory_utilization: 0.5
    val_kwargs:
      n: 2  # 2 will trigger validation, 1 will bypass

algorithm:
  adv_estimator: null

reward:
  # >0 enables STREAMING annotation: the agent loop scores each trajectory via
  # these reward-loop workers as it finishes generating (overlaps the judge with
  # generation). 0 = synchronous post-hoc reward path (original behavior).
  # Total judge concurrency ≈ num_workers * JUDGE_MAX_CONCURRENCY_PER_WORKER.
  num_workers: 16
  custom_reward_function:
    path: pkg://recipe.spin.active_ultrafeedback_reward
    name: compute_score

trainer:
  log_val_generations: 0
  ref_update_freq: 1